name = "nexgen-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"

# Custom domain: api.3nexgen.com (configured in Cloudflare DNS)
routes = [
  { pattern = "api.3nexgen.com/*", zone_name = "3nexgen.com" }
]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "nexgen-jobs"
database_id = "3456a3ee-7d15-4db2-9af1-27c274a31322"

# Environment variables (non-secret defaults)
[vars]
VARIANT_TIER_MAP = '{"placeholder_variant_1":1,"placeholder_variant_2":2,"placeholder_variant_3":3}'
OWNER_TELEGRAM_CHAT_ID = "340067089"
# DeepSeek V3.2: $0.28/1M input, $0.42/1M output
DEEPSEEK_INPUT_RATE = "0.00000028"
DEEPSEEK_OUTPUT_RATE = "0.00000042"
# OpenAI text-embedding-3-small: $0.02/1M input, $0 output (embeddings only)
OPENAI_INPUT_RATE = "0.00000002"
OPENAI_OUTPUT_RATE = "0"
# Zhipu GLM-4-Flash: FREE
ZHIPU_INPUT_RATE = "0"
ZHIPU_OUTPUT_RATE = "0"
USD_TO_HKD = "7.8"

# Secrets (set via `wrangler secret put`):
# LEMONSQUEEZY_WEBHOOK_SECRET — HMAC signing secret from Lemon Squeezy
# WORKER_TOKEN              — Pi5 authenticates with this
# CONFIRM_API_KEY           — You authenticate manual confirms with this
# OWNER_TELEGRAM_BOT_TOKEN  — Your personal bot token (for alerts)
# DEEPSEEK_API_KEY          — Real DeepSeek API key (proxied to customers)
# OPENAI_API_KEY            — Real OpenAI API key (proxied to customers)
