#cloud-config
users:
  - name: deploy
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - SSH_PUBLIC_KEY_PLACEHOLDER

package_update: true
packages:
  - curl
  - git
  - ufw
  - fail2ban
  - ca-certificates
  - gnupg
  - htop
  - jq

timezone: Asia/Hong_Kong

swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

runcmd:
  # CRITICAL: Use '22/tcp' not 'OpenSSH' — the OpenSSH UFW profile may not exist
  # on all Ubuntu images (e.g. Contabo). Using 'OpenSSH' fails silently and locks
  # out SSH access permanently once 'ufw enable' runs. See: 2026-03-28 lockout incident.
  - ufw allow 22/tcp
  - ufw --force enable
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - systemctl restart ssh
